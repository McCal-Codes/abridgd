name: Lint docs

on:
  pull_request:
  push:
    branches: ["master"]

jobs:
  lint-docs:
    name: Lint Markdown docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Run docs linter
        run: npm run lint:docs
